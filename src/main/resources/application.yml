logging:
  level:
    ROOT: INFO
    ee.finalthesis.clubmanagement: INFO

spring:
  application:
    name: club-management
  jpa:
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: Europe/Tallinn
      hibernate.timezone.default_storage: NORMALIZE
      hibernate.connection.provider_disables_autocommit: true
      hibernate.cache.use_second_level_cache: false
      hibernate.cache.use_query_cache: false
      hibernate.generate_statistics: false
      hibernate.jdbc.batch_size: 25
      hibernate.order_inserts: true
      hibernate.order_updates: true
      hibernate.query.fail_on_pagination_over_collection_fetch: true
      hibernate.query.in_clause_parameter_padding: true
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        implicit-strategy: org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy
  jackson:
    serialization:
      indent-output: true
  liquibase:
    change-log: classpath:config/liquibase/master.xml
    contexts: dev

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

server:
  port: 8080

application:
  security:
    jwt:
      secret: ${JWT_SECRET:Y2x1Yi1tYW5hZ2VtZW50LWp3dC1zZWNyZXQta2V5LXRoYXQtaXMtbG9uZy1lbm91Z2gtZm9yLWhtYWMtc2hhNTEy}
      token-validity-in-seconds: 14400
      refresh-token-validity-in-seconds: 604800
  cors:
    allowed-origins: http://localhost:3000
