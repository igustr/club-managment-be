services:
  postgres:
    image: postgres:17-alpine
    container_name: club-management-postgres
    environment:
      POSTGRES_DB: clubmanagement
      POSTGRES_USER: clubmanagement
      POSTGRES_PASSWORD: clubmanagement
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
